name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/inscripcion-cursos:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/inscripcion-cursos:latest

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Configure SSH key file
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keygen -y -f ~/.ssh/ec2_deploy_key > /dev/null
          echo "Clave PEM valida (formato OK)"

      - name: Test SSH connection to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          USER_SERVER: ${{ secrets.USER_SERVER }}
        run: |
          EC2_HOST="$(echo "$EC2_HOST" | tr -d '[:space:]')"
          USER_SERVER="$(echo "$USER_SERVER" | tr -d '[:space:]')"
          echo "Conectando como: ${USER_SERVER}@${EC2_HOST}"
          ssh -i ~/.ssh/ec2_deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o BatchMode=yes \
            "${USER_SERVER}@${EC2_HOST}" "echo SSH_OK && whoami && hostname"

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          USER_SERVER: ${{ secrets.USER_SERVER }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          ORACLE_USERNAME: ${{ secrets.ORACLE_USERNAME }}
          ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
        run: |
          EC2_HOST="$(echo "$EC2_HOST" | tr -d '[:space:]')"
          USER_SERVER="$(echo "$USER_SERVER" | tr -d '[:space:]')"
          SSH_BASE=(ssh -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null)
          TARGET="${USER_SERVER}@${EC2_HOST}"
          "${SSH_BASE[@]}" "$TARGET" "echo '${DOCKERHUB_TOKEN}' | docker login -u '${DOCKERHUB_USERNAME}' --password-stdin"
          "${SSH_BASE[@]}" "$TARGET" "docker pull '${DOCKERHUB_USERNAME}/inscripcion-cursos:latest'"
          "${SSH_BASE[@]}" "$TARGET" "docker stop inscripcion-cursos 2>/dev/null || true; docker rm inscripcion-cursos 2>/dev/null || true"
          "${SSH_BASE[@]}" "$TARGET" "docker run -d --name inscripcion-cursos -p 8080:8080 \
            -e ORACLE_JDBC_URL='jdbc:oracle:thin:@miquintabd_high?TNS_ADMIN=/wallet' \
            -e ORACLE_USERNAME='${ORACLE_USERNAME}' \
            -e ORACLE_PASSWORD='${ORACLE_PASSWORD}' \
            -e SERVER_PORT=8080 \
            -v /home/ec2-user/wallet:/wallet:ro \
            '${DOCKERHUB_USERNAME}/inscripcion-cursos:latest'"
          "${SSH_BASE[@]}" "$TARGET" "docker ps"
