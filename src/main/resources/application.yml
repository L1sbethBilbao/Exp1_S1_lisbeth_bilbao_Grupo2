spring:
  application:
    name: inscripcion-cursos
  datasource:
    url: ${ORACLE_JDBC_URL}
    username: ${ORACLE_USERNAME}
    password: ${ORACLE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.duoc.inscripcion_cursos: INFO
    org.hibernate.SQL: WARN

app:
  security:
    admin:
      username: ${APP_ADMIN_USER:admin}
      password: ${APP_ADMIN_PASSWORD:Admin2026!}
    estudiante:
      username: ${APP_ESTUDIANTE_USER:estudiante}
      password: ${APP_ESTUDIANTE_PASSWORD:Estudiante2026!}
